server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Ensure index.html is not cached so browsers fetch latest bundle
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Serve static assets, SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Specific mapping for health when requested under /api/health
    location = /api/health {
        proxy_pass http://backend:3001/health ;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API proxy — forward to backend service inside the docker network
    # Preserve the full /api/... path when proxying so backend receives
    # routes such as /api/auth/register, /api/cases, etc.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Health proxy (non-prefixed)
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # Long cache for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
