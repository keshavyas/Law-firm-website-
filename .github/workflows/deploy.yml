name: CI/CD Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Backend
      - name: Build/Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ Build & Push Frontend
      - name: Build/Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./caseR
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest
          build-args: |
             VITE_API_URL=""
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # ✅ Pass exact secrets to the script
          envs: DOCKER_USERNAME,DB_PASS,JWT_SECRET,EC2_HOST
          script: |
            mkdir -p ~/Law-firm-website-
            cd ~/Law-firm-website-
            
            # 🔥 Generate the docker-compose.yml on the host
            # Using cat << EOF (NO single quotes) to allow GitHub to expand variables
            cat << EOF > docker-compose.yml
            version: '3.9'
            services:
              db:
                image: postgres:15-alpine
                container_name: case_db
                hostname: db
                environment:
                  POSTGRES_DB: case_db
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: $DB_PASS
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                networks:
                  - democase
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres -d case_db"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                restart: unless-stopped

              backend:
                image: $DOCKER_USERNAME/democase_backend:latest
                container_name: democase_backend
                environment:
                  NODE_ENV: production
                  NODE_OPTIONS: --dns-result-order=ipv4first
                  PORT: 3001
                  HOST: 0.0.0.0
                  DB_HOST: case_db
                  DB_PORT: 5432
                  DB_USER: postgres
                  DB_NAME: case_db
                  DB_PASS: $DB_PASS
                  DATABASE_URL: postgres://postgres:$DB_PASS@case_db:5432/case_db
                  JWT_SECRET: $JWT_SECRET
                  FRONTEND_URL: http://$EC2_HOST
                ports:
                  - "3001:3001"
                networks:
                  - democase
                links:
                  - db
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped

              frontend:
                image: $DOCKER_USERNAME/democase_frontend:latest
                container_name: democase_frontend
                ports:
                  - "80:80"
                networks:
                  - democase
                depends_on:
                  backend:
                    condition: service_started
                restart: unless-stopped

            volumes:
              postgres_data:
            networks:
              democase:
                driver: bridge
            EOF
            
            # 🚀 Pull and Restart
            sudo docker-compose pull
            sudo docker-compose up -d --force-recreate
            
            # 🧹 Cleanup old images to prevent disk issues
            sudo docker image prune -f
