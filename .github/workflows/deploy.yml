name: CI/CD Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Backend
      - name: Build/Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ Build & Push Frontend
      - name: Build/Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./caseR
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest
          build-args: |
             VITE_API_URL=http://${{ secrets.EC2_HOST }}:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL || 'http://host.docker.internal:11434/api/generate' }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'phi' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,DB_PASS,JWT_SECRET,EC2_HOST,OLLAMA_URL,AI_MODEL
          script: |
            set -e
            mkdir -p ~/Case-manager
            cd ~/Case-manager
            
            # 🔥 Generate the optimized docker-compose.yml matching our current working setup
            cat << EOF > docker-compose.yml
            version: '3.8'
            
            services:
              db:
                image: postgres:15-alpine
                container_name: case_db
                environment:
                  POSTGRES_DB:       case_db
                  POSTGRES_USER:     postgres
                  POSTGRES_PASSWORD: $DB_PASS
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                ports:
                  - "5432:5432"
                networks:
                  - democase
                healthcheck:
                  test:     ["CMD-SHELL", "pg_isready -U postgres -d case_db"]
                  interval: 10s
                  timeout:  5s
                  retries:  10
                restart: unless-stopped
            
              backend:
                image: $DOCKER_USERNAME/democase_backend:latest
                container_name: democase_backend
                environment:
                  NODE_ENV:       production
                  NODE_OPTIONS:   --dns-result-order=ipv4first
                  PORT:           3001
                  HOST:           0.0.0.0
                  DB_HOST:        db
                  DB_PORT:        5432
                  DB_USER:        postgres
                  DB_NAME:        case_db
                  DB_PASS:        $DB_PASS
                  DATABASE_URL:   postgres://postgres:$DB_PASS@db:5432/case_db
                  JWT_SECRET:     $JWT_SECRET
                  FRONTEND_URL:   http://$EC2_HOST
                  OLLAMA_URL:     $OLLAMA_URL
                  AI_MODEL:       $AI_MODEL
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                volumes:
                  - uploads_data:/app/uploads
                ports:
                  - "3001:3001"
                networks:
                  - democase
                depends_on:
                  db:
                    condition: service_healthy
                healthcheck:
                  test:     ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
                  interval: 30s
                  timeout:  10s
                  retries:  3
                restart: unless-stopped
            
              frontend:
                image: $DOCKER_USERNAME/democase_frontend:latest
                container_name: democase_frontend
                ports:
                  - "80:80"
                networks:
                  - democase
                depends_on:
                  - backend
                restart: unless-stopped

            
            volumes:
              postgres_data:
              uploads_data:
            
            networks:
              democase:
                driver: bridge
            EOF
            
            # 🤖 Install / start Ollama on EC2 host (runs outside Docker)
            if ! command -v ollama &> /dev/null; then
              echo "Installing Ollama..."
              curl -fsSL https://ollama.com/install.sh | sh
            else
              echo "Ollama already installed: $(ollama --version)"
            fi
            
            # Ensure Ollama listens on all interfaces so Docker containers can reach it
            sudo mkdir -p /etc/systemd/system/ollama.service.d
            sudo tee /etc/systemd/system/ollama.service.d/override.conf > /dev/null <<OLLAMAEOF
            [Service]
            Environment="OLLAMA_HOST=0.0.0.0"
            OLLAMAEOF
            sudo systemctl daemon-reload
            sudo systemctl enable ollama
            sudo systemctl restart ollama
            sleep 5
            
            # Pull the phi model if not already present
            if ! ollama list | grep -q "phi"; then
              echo "Pulling phi model..."
              ollama pull phi
            else
              echo "phi model already available"
            fi
            
            # 🚀 Pull and Restart fresh
            # Using explicit docker stop/rm by name is the most reliable way to
            # bypass v1.x bugs (KeyError: ContainerConfig) and network locks.
            sudo docker-compose pull
            sudo docker stop democase_frontend democase_backend case_db || true
            sudo docker rm democase_frontend democase_backend case_db || true
            sudo docker-compose up -d
            
            # 🧹 Cleanup
            sudo docker image prune -f

        
