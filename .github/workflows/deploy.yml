name: CI/CD Deploy (Frontend + Backend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ 2. Debug folder structure (VERY IMPORTANT)
      - name: Verify project structure
        run: |
          echo "Listing root files..."
          ls -la
          echo "Listing backend..."
          ls -la backend || echo "❌ backend folder missing"
          echo "Listing frontend..."
          ls -la frontend || echo "❌ frontend folder missing"

      # ✅ 3. Docker login
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ 4. Build Backend (STRICT CHECK)
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest ./backend

      # ✅ 5. Push Backend
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest

      # ✅ 6. Build Frontend
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest ./caseR

      # ✅ 7. Push Frontend
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest

      # ✅ 8. Deploy to EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Pull latest images"
            docker pull ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest

            echo "🛑 Stop old containers"
            docker stop democase_backend || true
            docker rm democase_backend || true
            docker stop democase_frontend || true
            docker rm democase_frontend || true

            echo "🚀 Start backend"
            docker run -d \
              -p 3001:3001 \
              --env-file .env \
              --name democase_backend \
              ${{ secrets.DOCKER_USERNAME }}/democase_backend:latest

            echo "🚀 Start frontend"
            docker run -d \
              -p 80:80 \
              --name democase_frontend \
              ${{ secrets.DOCKER_USERNAME }}/democase_frontend:latest

            echo "✅ Deployment complete"
