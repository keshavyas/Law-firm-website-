version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: case_db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-case_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keshav}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - democase
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d case_db"]
      interval: 10s
      timeout:  5s
      retries:  10
    restart: unless-stopped

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: democase_backend:latest
    container_name: democase_backend
    environment:
      NODE_ENV:       production
      NODE_OPTIONS:   --dns-result-order=ipv4first
      PORT:           3001
      HOST:           0.0.0.0
      DB_HOST:        db
      DB_PORT:        5432
      DB_USER:        ${DB_USER:-postgres}
      DB_NAME:        ${DB_NAME:-case_db}
      DB_PASS:        ${DB_PASS:-keshav}
      DATABASE_URL:   postgres://${DB_USER:-postgres}:${DB_PASS:-keshav}@db:5432/${DB_NAME:-case_db}
      JWT_SECRET:     ${JWT_SECRET}
      FRONTEND_URL:   ${FRONTEND_URL}
      MAIL_HOST:      ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:      ${MAIL_PORT:-465}
      MAIL_USER:      ${MAIL_USER}
      MAIL_PASS:      ${MAIL_PASS}
      MAIL_FROM:      ${MAIL_FROM}
    volumes:
      - uploads_data:/app/uploads
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/entrypoint.sh:/app/entrypoint.sh:ro
    ports:
      - "3001:3001"
    networks:
      - democase
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
    restart: unless-stopped

  frontend:
    build:
      context:    ./caseR
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: democase_frontend:latest
    container_name: democase_frontend
    ports:
      - "80:80"
    networks:
      - democase
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  democase:
    driver: bridge