version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: case_db
    hostname: db
    environment:
      POSTGRES_DB:       case_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - democase
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d case_db"]
      interval: 10s
      timeout:  5s
      retries:  10
    restart: unless-stopped

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: democase_backend:latest
    container_name: democase_backend
    environment:
      NODE_ENV:       production
      PORT:           3001
      HOST:           0.0.0.0
      DB_HOST:        db
      DB_PORT:        5432
      DB_USER:        postgres
      DB_NAME:        case_db
      DATABASE_URL:   postgres://postgres:${DB_PASS}@db:5432/case_db
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS:  10
      FRONTEND_URL:   ${FRONTEND_URL:-http://13.60.185.226}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - democase
    links:
      - db
    depends_on:
      - db
    healthcheck:
      test:     ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
    restart: unless-stopped

  frontend:
    build:
      context:    ./caseR
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    image: democase_frontend:latest
    container_name: democase_frontend
    environment:
      VITE_API_URL: ""
    ports:
      - "80:80"
    networks:
      - democase
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  democase:
    driver: bridge